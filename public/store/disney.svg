<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <rect width="100" height="100" fill="#0c0717" rx="16"/>
  <defs>
    <linearGradient id="disney-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#021f55"/>
      <stop offset="100%" stop-color="#070b19"/>
    </linearGradient>
    <filter id="glow-disney" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#00a8e1" flood-opacity="0.3"/>
    </filter>
  </defs>
  <g filter="url(#glow-disney)">
    <rect x="20" y="20" width="60" height="60" rx="10" fill="url(#disney-grad)" stroke="#00a8e1" stroke-width="1.5"/>
    <text x="50" y="52" font-family="'Inter', sans-serif" font-weight="950" font-size="14" fill="#ffffff" text-anchor="middle">Disney+</text>
    <text x="50" y="66" font-family="'Inter', sans-serif" font-weight="700" font-size="9" fill="#ffcc00" text-anchor="middle" letter-spacing="1">HOTSTAR</text>
  </g>
</svg>
