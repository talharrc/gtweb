<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <rect width="100" height="100" fill="#0c0717" rx="16"/>
  <defs>
    <linearGradient id="apple-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff3b30"/>
      <stop offset="30%" stop-color="#ff9500"/>
      <stop offset="55%" stop-color="#4cd964"/>
      <stop offset="75%" stop-color="#5ac8fa"/>
      <stop offset="100%" stop-color="#5856d6"/>
    </linearGradient>
    <filter id="glow-apple" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#ffffff" flood-opacity="0.2"/>
    </filter>
  </defs>
  <g filter="url(#glow-apple)">
    <!-- apple card styling with logo -->
    <rect x="22" y="30" width="56" height="40" rx="6" fill="url(#apple-grad)"/>
    <path d="M50 43 C47 43, 45.5 45, 45.5 48.5 C45.5 52, 47 54, 50 54 C53 54, 54.5 52, 54.5 48.5 C54.5 45, 53 43, 50 43 Z M51.5 40.5 C52.5 39, 52 37.5, 50.5 37.5 C49 37.5, 48 39, 49 40.5 Z" fill="#ffffff" opacity="0.9"/>
    <text x="50" y="65" font-family="'Inter', sans-serif" font-weight="800" font-size="6" fill="#ffffff" text-anchor="middle" letter-spacing="0.5" opacity="0.9">iTunes Gift Card</text>
  </g>
</svg>
